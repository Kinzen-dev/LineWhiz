name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy
        run: uv run mypy src --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest -v --tb=short
        env:
          LINE_CHANNEL_ACCESS_TOKEN: test_token
          LINE_CHANNEL_SECRET: test_secret

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t linewhiz:ci .
      - name: Verify health endpoint
        run: |
          docker run -d --name linewhiz-ci \
            -p 8000:8000 \
            -e LINE_CHANNEL_ACCESS_TOKEN=test \
            -e LINE_CHANNEL_SECRET=test \
            -e LINEWHIZ_TRANSPORT=sse \
            linewhiz:ci

          # Wait for server to be ready (up to 15s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              curl -s http://localhost:8000/health
              docker stop linewhiz-ci
              exit 0
            fi
            sleep 1
          done

          # If we get here, server didn't start — dump logs for debugging
          echo "Health check failed after 15 attempts"
          docker logs linewhiz-ci
          docker stop linewhiz-ci
          exit 1
